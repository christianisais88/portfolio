    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Gloock', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#0a0a0a',
                            100: '#171717',
                            900: '#ffffff',
                        }
                    }

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Modal animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-overlay {
            animation: fadeIn 0.3s ease-out forwards;
        }
        .modal-content {
            animation: slideUp 0.4s ease-out forwards;
        }
        /* Hide scrollbar in modal but allow scroll */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>

        // --- Image Slider Component (Interactive Before/After) ---
        const ImageSlider = ({ images }) => {
            const [sliderPos, setSliderPos] = useState(50);
            
            // For the split view, images[0] acts as the Final Render, and images[1] acts as the Pre-Press Dieline.
            const finalImage = images[0];
            const dielineImage = images[1] || images[0];

            const handleSliderChange = (e) => {
                setSliderPos(e.target.value);
            };

            return (
                <div className="relative w-full h-[450px] md:h-full bg-[#1a1a1a] overflow-hidden group select-none">
                    {/* Underneath Image: Pre-Press Dieline */}
                    <img 
                        src={dielineImage} 
                        alt="Pre-Press Dieline"
                        className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                    />

                    {/* Top Image: Final Render (Dynamically Clipped) */}
                    <img 
                        src={finalImage} 
                        alt="Final Render"
                        className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                        style={{ clipPath: `inset(0 ${100 - sliderPos}% 0 0)` }}
                    />

                    {/* Invisible Range Input for Native Dragging */}

                        type="range" 
                        min="0" max="100" 
                        value={sliderPos} 
                        onChange={handleSliderChange}
                        className="absolute inset-0 w-full h-full opacity-0 cursor-ew-resize z-20 m-0"
                    />

                        </span>
                    </div>
                </div>
            );

        const ProjectModal = ({ project, onClose }) => {

            useEffect(() => {

                return () => { document.body.style.overflow = 'unset'; };
            }, []);

                    >
                        <button

                            <Icons.X />
                        </button>
                        
                        {/* Left Side: Thumbnail Gallery Slider */}

                        {/* Right Side: Scrollable Details */}

                            <span className="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3">{project.category}</span>
                            <h2 className="text-3xl md:text-4xl font-serif font-medium text-white mb-4 leading-tight">{project.title}</h2>

                                                <span className="w-2 h-2 rounded-full bg-pink-500"></span>
                                                <span className="w-2 h-2 rounded-full bg-yellow-400"></span>
                                            </div>
                                            <p className="text-sm text-gray-300 font-mono">{project.specs.colors}</p>
                                        </div>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 uppercase font-sans mb-1">Special Finishes</p>
                                        <p className="text-sm text-gray-300 font-mono">{project.specs.finishes}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Production Sequence Layout */}
                            <div>
                                <h4 className="text-sm font-semibold text-white uppercase tracking-widest mb-6 font-sans flex items-center gap-2">
                                    <span className="w-2 h-2 rounded-full bg-green-500"></span>
                                    Production Sequence
                                </h4>
                                <div className="space-y-0">
                                    {project.sequence.map((step, index) => (
                                        <div key={index} className="flex items-start gap-4">
                                            {/* Timeline Node */}
                                            <div className="flex flex-col items-center mt-1">
                                                <div className="w-3 h-3 rounded-full border-2 border-[#121212] bg-gray-400 outline outline-1 outline-white/20"></div>
                                                {index !== project.sequence.length - 1 && (
                                                    <div className="w-px h-12 bg-white/10 my-1"></div>
                                                )}
                                            </div>
                                            {/* Step Content */}
                                            <div className="pb-4">
                                                <p className="text-sm text-white font-mono">{step.name}</p>
                                                <p className="text-xs text-gray-500 font-mono mt-1">{step.detail}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeCategory, setActiveCategory] = useState("All");
            const [selectedProject, setSelectedProject] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const filteredProjects = activeCategory === "All" 
                ? projectData 
                : projectData.filter(p => p.category === activeCategory);

            return (
                <React.Fragment>
                    {/* Header */}
                    <header className="fixed w-full top-0 bg-[#0a0a0a]/80 backdrop-blur-md z-50 border-b border-white/5">
                        <div className="max-w-7xl mx-auto px-6 lg:px-8">
                            <div className="flex justify-between items-center h-24">
                                <a href="#" className="text-3xl font-serif tracking-wider text-white hover:text-gray-400 transition-colors">
                                    isaiz_
                                </a>

                                <div className="hidden md:flex items-center px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
                                    <span className="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
                                    <span className="text-xs font-medium text-gray-300 font-sans">Available for work</span>
                                </div>
                                
                                <nav className="hidden md:flex space-x-8">
                                    <a href="#work" className="text-sm font-medium text-white hover:text-gray-400 transition-colors font-sans">Work</a>
                                    <a href="#about" className="text-sm font-medium text-gray-400 hover:text-white transition-colors font-sans">About</a>
                                    <a href="#contact" className="text-sm font-medium text-gray-400 hover:text-white transition-colors font-sans">Contact</a>
                                </nav>

                                <button 
                                    className="md:hidden p-2 text-gray-400 hover:text-white focus:outline-none" 
                                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                >
                                    <Icons.Menu />
                                </button>
                            </div>
                        </div>

                        {mobileMenuOpen && (
                            <div className="md:hidden bg-[#121212] border-t border-white/5 px-6 py-6 space-y-6 shadow-lg">
                                <div className="flex items-center px-3 py-2 rounded-full bg-white/5 border border-white/10 w-fit">
                                    <span className="w-2 h-2 rounded-full bg-green-500 mr-2"></span>
                                    <span className="text-xs font-medium text-gray-300 font-sans">Available for work</span>
                                </div>
                                <a href="#work" className="block text-lg font-medium text-white font-sans" onClick={() => setMobileMenuOpen(false)}>Work</a>
                                <a href="#about" className="block text-lg font-medium text-gray-400 font-sans" onClick={() => setMobileMenuOpen(false)}>About</a>
                                <a href="#contact" className="block text-lg font-medium text-gray-400 font-sans" onClick={() => setMobileMenuOpen(false)}>Contact</a>
                            </div>
                        )}
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow pt-32 pb-16">
                        
                        {/* Hero */}
                        <section className="max-w-7xl mx-auto px-6 lg:px-8 mb-24 mt-12 md:mt-20">
                            <div className="max-w-4xl">
                                <h1 className="text-5xl md:text-7xl lg:text-8xl font-medium tracking-tight text-white mb-8 leading-[1.05] font-serif">
                                    Creative professional crafting digital experiences and visual solutions.
                                </h1>
                                <p className="text-lg md:text-2xl text-gray-400 font-light leading-relaxed mb-10 max-w-2xl font-sans">
                                    Welcome to my interactive gallery. Select any project to view detailed packaging specifications, image galleries, and production sequences.
                                </p>
                            </div>
                        </section>

                        {/* Interactive Gallery Section */}
                        <section id="work" className="max-w-7xl mx-auto px-6 lg:px-8 scroll-mt-32">
                            
                            {/* Filter Buttons */}
                            <div className="flex flex-wrap gap-3 mb-16">
                                {CATEGORIES.map(category => (
                                    <button
                                        key={category}
                                        onClick={() => setActiveCategory(category)}
                                        className={`px-6 py-2 rounded-full text-sm font-medium transition-all duration-300 font-sans ${
                                            activeCategory === category
                                                ? "bg-white text-black"
                                                : "bg-transparent text-gray-400 border border-white/20 hover:border-white/60 hover:text-white"
                                        }`}
                                    >
                                        {category}
                                    </button>
                                ))}
                            </div>

                            {/* Project Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-x-8 gap-y-16 lg:gap-y-24">
                                {filteredProjects.map(project => (
                                    <div 
                                        key={project.id} 
                                        className="group block cursor-pointer"
                                        onClick={() => setSelectedProject(project)}
                                    >
                                        <div className="overflow-hidden rounded-xl bg-[#1a1a1a] mb-6 relative aspect-[4/3]">
                                            <img 
                                                src={project.images[0]} 
                                                alt={project.title} 
                                                className="w-full h-full object-cover transition-transform duration-700 ease-[cubic-bezier(0.4,0,0.2,1)] group-hover:scale-105" 
                                            />
                                        </div>
                                        <div>
                                            <h3 className="text-2xl font-medium text-white mb-2 font-serif">{project.title}</h3>
                                            <p className="text-gray-400 mb-4 line-clamp-2 font-light font-sans">{project.description}</p>
                                            <div className="flex flex-wrap gap-4">
                                                {project.tags.map(tag => (
                                                    <span key={tag} className="text-xs font-semibold text-gray-500 uppercase tracking-widest font-sans">{tag}</span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Footer */}
                    <footer id="contact" className="bg-[#0a0a0a] border-t border-white/5 mt-24 scroll-mt-20">
                        <div className="max-w-7xl mx-auto px-6 lg:px-8 py-20">
                            <div className="md:flex md:items-center md:justify-between">
                                <div className="mb-12 md:mb-0">
                                    <h2 className="text-4xl md:text-5xl font-medium tracking-tight text-white mb-6 font-serif">Let's work together.</h2>
                                    <p className="text-gray-400 mb-8 max-w-md text-lg font-light font-sans">I am always open to discussing new projects, creative ideas, or opportunities to be part of your visions.</p>
                                    <a href="mailto:hello@example.com" className="inline-flex items-center text-xl font-medium text-white hover:text-gray-400 transition-colors border-b border-white/20 pb-1 hover:border-gray-400 font-sans">
                                        Get in touch
                                        <span className="ml-2"><Icons.ArrowUpRight /></span>
                                    </a>
                                </div>
                                
                                <div className="flex space-x-8">
                                    <a href="#" className="text-gray-500 hover:text-white transition-colors"><Icons.LinkedIn /></a>
                                    <a href="#" className="text-gray-500 hover:text-white transition-colors"><Icons.Twitter /></a>
                                    <a href="#" className="text-gray-500 hover:text-white transition-colors"><Icons.Github /></a>
                                </div>
                            </div>
                            
                            <div className="mt-20 border-t border-white/5 pt-8 flex flex-col md:flex-row justify-between items-center text-gray-500 font-light font-sans">
                                <p className="text-sm">
                                    &copy; {new Date().getFullYear()} Christian Isais. All rights reserved.
                                </p>
                                <p className="text-sm mt-4 md:mt-0 flex items-center gap-4">
                                    <span className="font-mono text-xs flex gap-1 items-center"><span className="w-2 h-2 bg-cyan-500 rounded-full"></span> Cyan</span>
                                    <span className="font-mono text-xs flex gap-1 items-center"><span className="w-2 h-2 bg-pink-500 rounded-full"></span> Magenta</span>
                                    <span className="font-mono text-xs flex gap-1 items-center"><span className="w-2 h-2 bg-yellow-400 rounded-full"></span> Yellow</span>
                                    <span className="font-mono text-xs flex gap-1 items-center"><span className="w-2 h-2 border border-gray-500 rounded-full"></span> Black</span>
                                </p>
                            </div>
                        </div>
                    </footer>

                    {/* Interactive Modal */}
                    <ProjectModal project={selectedProject} onClose={() => setSelectedProject(null)} />
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
